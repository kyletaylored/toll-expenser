name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  build:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    # Skip when the release bot pushes the version bump commit — CI already ran before the release.
    if: github.actor != 'github-actions[bot]'

    strategy:
      matrix:
        node-version: ["latest", "lts/*"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build frontend
        run: npm run build
