name: Preview

on:
  push:
    branches: ["**"]

# Only one preview deploy at a time — cancel in-flight runs if a newer push arrives
concurrency:
  group: preview
  cancel-in-progress: true

jobs:
  preview:
    name: Deploy preview (dev alias)
    runs-on: ubuntu-latest
    # Skip the release bot's version-bump commit — the release deploy handles that
    if: github.actor != 'github-actions[bot]'

    env:
      # Vite build-time vars — same as deploy.yml except DD_ENV and DD_VERSION
      VITE_APP_URL: ${{ vars.VITE_APP_URL }}
      VITE_DD_RUM_APPLICATION_ID: ${{ vars.VITE_DD_RUM_APPLICATION_ID }}
      VITE_DD_RUM_CLIENT_TOKEN: ${{ vars.VITE_DD_RUM_CLIENT_TOKEN }}
      VITE_DD_SITE: ${{ vars.VITE_DD_SITE }}
      VITE_DD_ENV: dev
      VITE_DD_SERVICE: ${{ vars.VITE_DD_SERVICE }}
      VITE_DD_VERSION: ${{ github.sha }}
      VITE_DD_SESSION_SAMPLE_RATE: ${{ vars.VITE_DD_SESSION_SAMPLE_RATE }}
      VITE_DD_SESSION_REPLAY_SAMPLE_RATE: ${{ vars.VITE_DD_SESSION_REPLAY_SAMPLE_RATE }}
      VITE_DD_DEFAULT_PRIVACY_LEVEL: ${{ vars.VITE_DD_DEFAULT_PRIVACY_LEVEL }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload preview version
        run: npx wrangler versions upload --preview-alias dev --message "${{ github.ref_name }}@${{ github.sha }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
