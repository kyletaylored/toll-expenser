name: Deploy

on:
  release:
    types: [published]

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest

    env:
      # Vite build-time vars — embedded into the frontend JS bundle
      VITE_APP_URL: ${{ vars.VITE_APP_URL }}
      VITE_DD_RUM_APPLICATION_ID: ${{ vars.VITE_DD_RUM_APPLICATION_ID }}
      VITE_DD_RUM_CLIENT_TOKEN: ${{ vars.VITE_DD_RUM_CLIENT_TOKEN }}
      VITE_DD_SITE: ${{ vars.VITE_DD_SITE }}
      VITE_DD_ENV: ${{ vars.VITE_DD_ENV }}
      VITE_DD_SERVICE: ${{ vars.VITE_DD_SERVICE }}
      VITE_DD_VERSION: ${{ github.event.release.tag_name }}
      VITE_DD_SESSION_SAMPLE_RATE: ${{ vars.VITE_DD_SESSION_SAMPLE_RATE }}
      VITE_DD_SESSION_REPLAY_SAMPLE_RATE: ${{ vars.VITE_DD_SESSION_REPLAY_SAMPLE_RATE }}
      VITE_DD_DEFAULT_PRIVACY_LEVEL: ${{ vars.VITE_DD_DEFAULT_PRIVACY_LEVEL }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # - name: Push secrets to Cloudflare
      #   if: env.DD_API_KEY != ''
      #   run: echo "$DD_API_KEY" | npx wrangler secret put DD_API_KEY
      #   env:
      #     CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy
        run: npx wrangler deploy --message "${{ github.event.release.tag_name }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
